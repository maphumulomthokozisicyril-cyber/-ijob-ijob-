<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ijobijob</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #172126;
        background: #f7f8f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(680px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        max-width: 48rem;
        margin: 0;
        color: #4d5b60;
        font-size: 1.125rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ijobijob</h1>
      <p>
        The site is configured to publish from the app directory without a build
        command.
      </p>
    </main>
  </body>
</html>
